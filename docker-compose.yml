# Local development Postgres for the journal binder app.
# Production uses a Coolify-managed Postgres service (set DATABASE_URL there).
services:
  postgres:
    image: postgres:17-alpine
    container_name: journal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: journal
      POSTGRES_PASSWORD: journal
      POSTGRES_DB: journal
    ports:
      # Host port 55433 to avoid clashing with other local Postgres instances.
      - "55433:5432"
    volumes:
      - journal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journal -d journal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  journal_pgdata:
