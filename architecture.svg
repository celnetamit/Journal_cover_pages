<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 760" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#475569"/>
    </marker>
    <marker id="arrowDash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="760" fill="#ffffff"/>
  <text x="490" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Journal Binder — System Architecture</text>
  <text x="490" y="62" text-anchor="middle" font-size="13" fill="#64748b">Next.js 16 (App Router) · Prisma 7 · PostgreSQL · JWT auth · Docker / Coolify</text>

  <!-- ============ Browser band ============ -->
  <rect x="40" y="84" width="900" height="104" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="60" y="106" font-size="13" font-weight="700" fill="#1d4ed8">🌐 BROWSER</text>
  <rect x="110" y="116" width="380" height="58" rx="9" fill="#ffffff" stroke="#94a3b8"/>
  <text x="300" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Dashboard &amp; Admin UI</text>
  <text x="300" y="158" text-anchor="middle" font-size="11" fill="#64748b">React client components</text>
  <rect x="520" y="116" width="380" height="58" rx="9" fill="#ffffff" stroke="#94a3b8"/>
  <text x="710" y="140" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">PDF export</text>
  <text x="710" y="158" text-anchor="middle" font-size="11" fill="#64748b">html2canvas + jsPDF (client-side)</text>

  <!-- ============ Next.js server band ============ -->
  <rect x="40" y="226" width="900" height="278" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="60" y="248" font-size="13" font-weight="700" fill="#334155">▲ NEXT.JS SERVER  ·  node server.js</text>

  <!-- proxy -->
  <rect x="110" y="262" width="790" height="42" rx="9" fill="#fef9c3" stroke="#fde047"/>
  <text x="505" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">proxy.ts — auth gate (redirects to /login if no valid session)</text>

  <!-- three handlers -->
  <rect x="110" y="332" width="240" height="70" rx="9" fill="#ffffff" stroke="#94a3b8"/>
  <text x="230" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Server Components</text>
  <text x="230" y="380" text-anchor="middle" font-size="11" fill="#64748b">pages · data loading</text>

  <rect x="380" y="332" width="240" height="70" rx="9" fill="#ffffff" stroke="#94a3b8"/>
  <text x="500" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Server Actions</text>
  <text x="500" y="380" text-anchor="middle" font-size="11" fill="#64748b">mutations (forms)</text>

  <rect x="650" y="332" width="250" height="70" rx="9" fill="#ffffff" stroke="#94a3b8"/>
  <text x="775" y="358" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Route Handlers</text>
  <text x="775" y="375" text-anchor="middle" font-size="10.5" fill="#64748b">/api/journals/[id]/binder</text>
  <text x="775" y="390" text-anchor="middle" font-size="10.5" fill="#64748b">/api/binders/[id] · /api/assets</text>

  <!-- DAL -->
  <rect x="110" y="432" width="790" height="42" rx="9" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text x="505" y="458" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Auth DAL — requireRole() / canEdit()  ·  enforced in every page, action &amp; route</text>

  <!-- ============ Data band ============ -->
  <rect x="40" y="542" width="900" height="170" rx="12" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="60" y="564" font-size="13" font-weight="700" fill="#15803d">🗄️ DATA</text>
  <rect x="300" y="576" width="380" height="44" rx="9" fill="#ffffff" stroke="#94a3b8"/>
  <text x="490" y="603" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Prisma Client (pg driver adapter)</text>
  <rect x="300" y="644" width="380" height="54" rx="9" fill="#dcfce7" stroke="#86efac"/>
  <text x="490" y="668" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">PostgreSQL</text>
  <text x="490" y="686" text-anchor="middle" font-size="11" fill="#3f6212">relational tables + uploaded image bytes (Asset)</text>

  <!-- ============ Arrows ============ -->
  <!-- UI -> proxy -->
  <line x1="300" y1="174" x2="300" y2="260" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="312" y="218" font-size="11" fill="#475569">HTTP</text>
  <!-- PDF -> Route Handlers (dashed, routed through right padding clear of boxes) -->
  <polyline points="880,174 920,196 920,320 855,332" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
  <text x="918" y="250" text-anchor="end" font-size="11" fill="#94a3b8">fetch images</text>
  <!-- proxy -> three -->
  <line x1="230" y1="304" x2="230" y2="332" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="304" x2="500" y2="332" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="775" y1="304" x2="775" y2="332" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- three -> DAL -->
  <line x1="230" y1="402" x2="230" y2="432" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDash)"/>
  <line x1="500" y1="402" x2="500" y2="432" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDash)"/>
  <line x1="775" y1="402" x2="775" y2="432" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDash)"/>
  <!-- server -> Prisma -->
  <line x1="500" y1="474" x2="490" y2="576" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="502" y="528" font-size="11" fill="#475569">queries</text>
  <!-- Prisma -> Postgres -->
  <line x1="490" y1="620" x2="490" y2="644" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="637" font-size="11" fill="#475569">SQL</text>

  <text x="490" y="742" text-anchor="middle" font-size="11" fill="#94a3b8">Packaged as a Next.js standalone Docker image on Coolify · PostgreSQL as a managed service · migrations run on boot · sessions = stateless JWT cookie (jose)</text>
</svg>
