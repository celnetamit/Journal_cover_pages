<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="1320" viewBox="0 0 1180 1320" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,4 L0,8 Z" fill="#16a34a"/>
    </marker>
    <style>
      .title { font-size: 30px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 15px; fill: #64748b; }
      .layer { font-size: 13px; font-weight: 700; fill: #94a3b8; letter-spacing: 2px; }
      .box-title { font-size: 17px; font-weight: 700; fill: #0f172a; }
      .box-sub { font-size: 13px; fill: #475569; }
      .mono { font-family: 'SF Mono', Consolas, monospace; font-size: 12px; fill: #334155; }
      .edge { font-size: 12px; fill: #475569; }
      .edgeGreen { font-size: 12px; font-weight: 700; fill: #16a34a; }
    </style>
  </defs>

  <rect width="1180" height="1320" fill="#f8fafc"/>

  <!-- Header -->
  <text x="60" y="58" class="title">Management Page — Data Flow &amp; Fix</text>
  <text x="60" y="86" class="subtitle">Journal_cover_pages · How Setup-selected profiles reach the binder's Management (Page 5)</text>
  <line x1="60" y1="104" x2="1120" y2="104" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Layer labels -->
  <text x="60" y="150" class="layer">SETUP (ADMIN UI)</text>
  <text x="60" y="370" class="layer">SERVER ACTION</text>
  <text x="60" y="560" class="layer">DATABASE</text>
  <text x="60" y="760" class="layer">DYNAMIC DATA BUILD</text>
  <text x="60" y="980" class="layer">DRAFT ASSEMBLY (CLIENT)</text>
  <text x="60" y="1230" class="layer">RENDER</text>

  <!-- 1. Setup UI -->
  <rect x="60" y="166" width="420" height="150" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="84" y="196" class="box-title">JournalBoardEditor</text>
  <text x="84" y="220" class="box-sub">Admin picks a Profile + Role + Order</text>
  <text x="84" y="244" class="mono">role ∈ { MANAGEMENT_HEAD,</text>
  <text x="84" y="262" class="mono">         MANAGEMENT_MEMBER }</text>
  <text x="84" y="290" class="box-sub">src/components/admin/JournalBoardEditor.tsx</text>
  <text x="84" y="308" class="mono">&lt;form action={addJournalMember}&gt;</text>

  <!-- 2. Profiles source (side box) -->
  <rect x="700" y="166" width="420" height="150" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="724" y="196" class="box-title">Profile records</text>
  <text x="724" y="220" class="box-sub">name · designation · department · photoUrl</text>
  <text x="724" y="244" class="box-sub">Reused as person data for any journal/role.</text>
  <text x="724" y="290" class="box-sub">prisma model Profile</text>
  <text x="724" y="308" class="mono">/admin/profiles</text>

  <!-- 1 -> 2 link -->
  <line x1="480" y1="241" x2="700" y2="241" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="500" y="233" class="edge">selects existing profile</text>

  <!-- arrow setup -> action -->
  <line x1="270" y1="316" x2="270" y2="386" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="284" y="356" class="edge">submit</text>

  <!-- 3. Server action -->
  <rect x="60" y="386" width="420" height="140" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="84" y="416" class="box-title">addJournalMember()</text>
  <text x="84" y="440" class="box-sub">Upserts the JournalMember link</text>
  <text x="84" y="462" class="mono">prisma.journalMember.upsert(...)</text>
  <text x="84" y="486" class="mono">revalidatePath("/")  + /journals/.../edit</text>
  <text x="84" y="510" class="box-sub">src/app/actions/entities.ts</text>

  <!-- arrow action -> db -->
  <line x1="270" y1="526" x2="270" y2="582" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="284" y="560" class="edge">write</text>

  <!-- 4. DB -->
  <rect x="60" y="582" width="420" height="150" rx="12" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="84" y="612" class="box-title">JournalMember</text>
  <text x="84" y="636" class="mono">journalId · profileId</text>
  <text x="84" y="654" class="mono">role: JournalRole · order</text>
  <text x="84" y="680" class="box-sub">@@unique([journalId, profileId, role])</text>
  <text x="84" y="704" class="box-sub">prisma/schema.prisma → relation to Profile</text>

  <!-- DB profile box -->
  <rect x="700" y="582" width="420" height="150" rx="12" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="724" y="612" class="box-title">Profile (joined)</text>
  <text x="724" y="636" class="box-sub">Supplies name / role / department / photo</text>
  <text x="724" y="660" class="mono">members: { include: { profile: true } }</text>
  <text x="724" y="700" class="box-sub">ordered by `order` asc</text>

  <line x1="480" y1="657" x2="700" y2="657" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrow db -> dynamic -->
  <line x1="270" y1="732" x2="270" y2="786" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="284" y="764" class="edge">findMany + include</text>

  <!-- 5. Dynamic data build -->
  <rect x="60" y="786" width="1060" height="160" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="84" y="816" class="box-title">getDynamicBinderData()  —  src/lib/formidable.ts</text>
  <text x="84" y="842" class="box-sub">For each journal: split members by role and key the result under journal aliases</text>
  <text x="84" y="868" class="mono">headMember = members.find(role === "MANAGEMENT_HEAD")</text>
  <text x="84" y="888" class="mono">memberRows = members.filter(role === "MANAGEMENT_MEMBER")</text>
  <text x="84" y="908" class="mono">addAliases(data.managementByKey, { head, members }, [abbreviation, shortName, name, id, slug, legacyId])</text>
  <text x="700" y="868" class="box-sub">Output: managementByKey</text>
  <text x="700" y="888" class="mono">{ "&lt;journalKey&gt;": { head, members[] } }</text>
  <text x="700" y="912" class="box-sub">keys normalized via dynamicKey()</text>

  <!-- arrow dynamic -> draft -->
  <line x1="270" y1="946" x2="270" y2="1002" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="284" y="978" class="edge">dynamicData prop</text>

  <!-- 6a. initialDrafts -->
  <rect x="60" y="1002" width="500" height="190" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="84" y="1032" class="box-title">initialDrafts()</text>
  <text x="84" y="1056" class="box-sub">Picks the draft source per journal</text>
  <text x="84" y="1082" class="mono">serverDrafts[id]?.draft</text>
  <text x="84" y="1100" class="mono">  || draftFromDynamic(journal, dynamicData)</text>
  <text x="84" y="1130" class="box-sub" fill="#b45309">⚠ A saved draft wins and carries the</text>
  <text x="84" y="1148" class="box-sub" fill="#b45309">   seed team — Setup changes were lost here.</text>
  <text x="84" y="1174" class="box-sub">src/components/JournalDashboard.tsx</text>

  <!-- 6b. normalizeDraftForJournal (the fix) -->
  <rect x="600" y="1002" width="520" height="190" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="624" y="1032" class="box-title" fill="#15803d">normalizeDraftForJournal()  ★ FIX</text>
  <text x="624" y="1056" class="box-sub">Overlays DB management onto a saved draft</text>
  <text x="624" y="1082" class="mono">management = findDynamicValue(journal,</text>
  <text x="624" y="1100" class="mono">                managementByKey)</text>
  <text x="624" y="1124" class="mono">if seed team → use management.head/.members</text>
  <text x="624" y="1148" class="mono">else keep inline-edited team (unchanged)</text>
  <text x="624" y="1174" class="box-sub" fill="#15803d">mirrors the existing focus overlay; runs before law fallback</text>

  <!-- link 6a -> 6b -->
  <line x1="560" y1="1097" x2="600" y2="1097" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- arrow draft -> render -->
  <line x1="860" y1="1192" x2="860" y2="1244" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="874" y="1224" class="edgeGreen">hydrated draft</text>

  <!-- 7. Render -->
  <rect x="600" y="1244" width="520" height="56" rx="12" fill="#0f172a"/>
  <text x="624" y="1270" class="box-title" fill="#ffffff">Management Page (Page 5)</text>
  <text x="624" y="1290" class="mono" fill="#cbd5e1">ManagementProfile head + members grid</text>

  <!-- revalidate feedback loop -->
  <path d="M 480 456 C 590 456, 590 230, 700 230" fill="none" stroke="#cbd5e1" stroke-width="1.2" stroke-dasharray="3 4"/>
</svg>
